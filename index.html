<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vodomery bytovka</title>
<style>
body{font-family:Arial;padding:20px;max-width:500px;margin:auto}
input{width:100%;padding:8px;margin:4px 0}
.card{border:1px solid #ccc;padding:10px;margin:10px 0;border-radius:10px}
button{padding:10px;width:100%;margin-top:10px}
</style>
</head>
<body>

<h2>Vodomery bytovka</h2>

<label>Dátum:</label>
<input type="date" id="datum">

<label>Cena za m³ (€):</label>
<input type="number" id="cena" value="2.35">

<div id="byty"></div>

<h3 id="sucet">Celá bytovka spolu: 0 €</h3>
<button onclick="ulozMesiac()">Uložiť mesačný odpis</button>
<div id="historia"></div>
 
<script>
const byty=document.getElementById('byty');
let ulozene=JSON.parse(localStorage.getItem('vodomery'))||[];

for(let i=1;i<=6;i++){
 let data=ulozene[i-1]||{};
 byty.innerHTML+=`
 <div class="card">
 <h3>Byt ${i}</h3>
 <input placeholder="Meno vlastníka" value="${data.meno||''}" class="meno">
 <input type="number" placeholder="Predošlý stav byt" value="${data.pb||''}" class="pb">
 <input type="number" placeholder="Nový stav byt" value="${data.nb||''}" class="nb">
 <input type="number" placeholder="Predošlá kotolňa" value="${data.pk||''}" class="pk">
 <input type="number" placeholder="Nová kotolňa" value="${data.nk||''}" class="nk">
 <div class="vysledok">Spolu: 0 €</div>
 </div>`;
}

document.querySelectorAll('.card').forEach((card,index)=>{
 card.addEventListener('input',()=>{
   let cena=parseFloat(document.getElementById('cena').value)||0;
   let pb=parseFloat(card.querySelector('.pb').value)||0;
   let nb=parseFloat(card.querySelector('.nb').value)||0;
   let pk=parseFloat(card.querySelector('.pk').value)||0;
   let nk=parseFloat(card.querySelector('.nk').value)||0;
   let meno=card.querySelector('.meno').value;

   let byt=(nb-pb)*cena;
   let kot=(nk-pk)*cena;
   let spolu=byt+kot;

   card.querySelector('.vysledok').innerHTML=
   `Byt ${(nb-pb)} m³ | Kotolňa ${(nk-pk)} m³ <br><b>Spolu ${spolu.toFixed(2)} €</b>`;

   ulozene[index]={
    meno,pb,nb,pk,nk
   };

   localStorage.setItem('vodomery',JSON.stringify(ulozene));

   prepocet();
 });
});

function prepocet(){
 let total=0;
 document.querySelectorAll('.vysledok').forEach(v=>{
   let txt=v.innerText.match(/Spolu ([0-9.]+)/);
   if(txt) total+=parseFloat(txt[1]);
 });
 document.getElementById('sucet').innerText='Celá bytovka spolu: '+total.toFixed(2)+' €';
}
let historia = JSON.parse(localStorage.getItem('historia')) || [];

function ulozMesiac(){
 let datum = document.getElementById('datum').value;
 if(!datum) return;

 let zaznam = [];
 document.querySelectorAll('.card').forEach((card,index)=>{
   let vysledok = card.querySelector('.vysledok').innerText;
   zaznam.push(`Byt ${index+1}: ${vysledok}`);
 });

 historia.unshift({
   datum: datum,
   data: zaznam
 });

 localStorage.setItem('historia', JSON.stringify(historia));
 zobrazHistoriu();
}

function zobrazHistoriu(){
 let div = document.getElementById('historia');
 div.innerHTML = '';

 historia.forEach(m=>{
   div.innerHTML += `<div class="card"><b>${m.datum}</b><br>${m.data.join('<br>')}</div>`;
 });
}

zobrazHistoriu();
</script>

</body>
</html>
